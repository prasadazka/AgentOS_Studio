# Secret Manager - Secure Secrets Storage
name: secret_manager
description: "Store and manage API keys, passwords, certificates, and other secrets"
category: gcp_security
version: "1.0.0"

command:
  base: "gcloud secrets"
  flags:
    project_id: "--project"
    replication_policy: "--replication-policy"
    labels: "--labels"
    data_file: "--data-file"

parameters:
  - name: action
    type: enum
    required: true
    enum_values:
      - "create"           # Create secret
      - "delete"           # Delete secret
      - "describe"         # Get secret metadata
      - "list"             # List secrets
      - "add_version"      # Add new version
      - "access"           # Access secret value
      - "versions_list"    # List versions
      - "versions_disable" # Disable a version
    description: "Operation to perform"

  - name: secret_name
    type: string
    required: true
    pattern: "^[a-zA-Z][a-zA-Z0-9_-]{0,254}$"
    description: "Secret name"

  - name: project_id
    type: string
    required: true
    description: "GCP project ID"

  - name: replication_policy
    type: enum
    default: "automatic"
    enum_values:
      - "automatic"  # Google manages replication
      - "user-managed"  # You choose regions
    description: "Replication policy"

  - name: secret_value
    type: string
    description: "Secret value (for create/add_version)"

  - name: version
    type: string
    default: "latest"
    description: "Version to access (latest, 1, 2, etc.)"

  - name: labels
    type: string
    description: "Labels as key=value,key2=value2"

timeout_seconds: 30
requires_project: true
output_format: json

examples:
  - description: "Create a new secret"
    params:
      action: "create"
      secret_name: "database-password"
      replication_policy: "automatic"

  - description: "Add secret value"
    params:
      action: "add_version"
      secret_name: "database-password"
      secret_value: "super-secret-password-123"

  - description: "Access latest secret value"
    params:
      action: "access"
      secret_name: "database-password"
      version: "latest"

  - description: "List all secrets"
    params:
      action: "list"
      project_id: "my-project"

related_tools:
  - cloud_run
  - cloud_functions
  - iam_role_assigner

pricing_url: "https://cloud.google.com/secret-manager/pricing"
estimated_cost: "$0.06/10k access operations + $0.03/version/month"
