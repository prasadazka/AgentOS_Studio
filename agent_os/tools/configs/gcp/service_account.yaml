# Service Accounts - IAM Identity Management
name: service_account
description: "Create and manage service accounts for workload identity"
category: gcp_security
version: "1.0.0"

command:
  base: "gcloud iam service-accounts"
  flags:
    project_id: "--project"
    display_name: "--display-name"
    description: "--description"

parameters:
  - name: action
    type: enum
    required: true
    enum_values:
      - "create"           # Create service account
      - "delete"           # Delete service account
      - "describe"         # Get details
      - "list"             # List service accounts
      - "add_iam"          # Add IAM binding to SA
      - "remove_iam"       # Remove IAM binding
      - "create_key"       # Create JSON key (avoid if possible)
      - "list_keys"        # List keys
      - "delete_key"       # Delete key
      - "enable"           # Enable disabled SA
      - "disable"          # Disable SA
    description: "Operation to perform"

  - name: account_name
    type: string
    required: true
    pattern: "^[a-z][a-z0-9-]{4,28}[a-z0-9]$"
    description: "Service account name (6-30 chars)"

  - name: project_id
    type: string
    required: true
    description: "GCP project ID"

  - name: display_name
    type: string
    description: "Human-readable display name"

  - name: description
    type: string
    description: "Service account description"

  - name: member
    type: string
    description: "Member to grant access (user:, serviceAccount:, group:)"

  - name: role
    type: enum
    enum_values:
      # Common roles
      - "roles/iam.serviceAccountUser"
      - "roles/iam.serviceAccountTokenCreator"
      - "roles/iam.workloadIdentityUser"
      # Cloud Run
      - "roles/run.invoker"
      - "roles/run.admin"
      # Storage
      - "roles/storage.admin"
      - "roles/storage.objectViewer"
      # Database
      - "roles/cloudsql.client"
      - "roles/alloydb.client"
      # Secrets
      - "roles/secretmanager.secretAccessor"
      # Pub/Sub
      - "roles/pubsub.publisher"
      - "roles/pubsub.subscriber"
      # AI
      - "roles/aiplatform.user"
    description: "IAM role to grant"

  - name: key_file
    type: string
    description: "Path to save JSON key file"

  - name: key_id
    type: string
    description: "Key ID for delete operation"

timeout_seconds: 60
requires_project: true
output_format: json

# Service connections
connects_to:
  - cloud_run: "Workload identity for services"
  - cloud_functions: "Function identity"
  - cloud_build: "Build-time identity"
  - workload_identity: "GitHub Actions auth"

examples:
  - description: "Create deployer service account"
    params:
      action: "create"
      account_name: "myapp-deployer"
      display_name: "MyApp Deployer"
      description: "Service account for CI/CD deployments"

  - description: "Create Cloud Run runtime account"
    params:
      action: "create"
      account_name: "myapp-runtime"
      display_name: "MyApp Runtime"
      description: "Runtime identity for Cloud Run services"

  - description: "Grant Cloud SQL access"
    params:
      action: "add_iam"
      account_name: "myapp-runtime"
      member: "serviceAccount:myapp-runtime@myproj.iam.gserviceaccount.com"
      role: "roles/cloudsql.client"

  - description: "Grant Secret Manager access"
    params:
      action: "add_iam"
      account_name: "myapp-runtime"
      member: "serviceAccount:myapp-runtime@myproj.iam.gserviceaccount.com"
      role: "roles/secretmanager.secretAccessor"

  - description: "Grant GitHub Actions Workload Identity"
    params:
      action: "add_iam"
      account_name: "myapp-deployer"
      member: "principalSet://iam.googleapis.com/projects/123/locations/global/workloadIdentityPools/github-pool/attribute.repository/myorg/myapp"
      role: "roles/iam.workloadIdentityUser"

related_tools:
  - cloud_run
  - cloud_build
  - secret_manager
  - workload_identity

pricing_url: "https://cloud.google.com/iam/pricing"
estimated_cost: "Free (IAM is free)"
